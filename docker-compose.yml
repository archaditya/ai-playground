services:

  postgres:
    image: postgres:17-alpine
    container_name: ai-playground-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: playground
      POSTGRES_PASSWORD: playground_dev
      POSTGRES_DB: ai_playground

    ports:
      - "127.0.0.1:5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playground -d ai_playground"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: ai-playground-qdrant
    restart: unless-stopped

    ports:
      - "127.0.0.1:6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

  app:
    container_name: ai-playground-app

    build:
      context: .

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://playground:playground_dev@postgres:5432/ai_playground
      QDRANT_URL: http://qdrant:6333

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  qdrant_data:
